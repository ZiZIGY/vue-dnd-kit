<svg
  width="396"
  height="341"
  viewBox="-50 -50 396 341"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <!-- Радиальный градиент заливки — призматические тона -->
    <radialGradient id="radialDGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color: #42b883; stop-opacity: 0.9">
        <animate attributeName="stop-opacity" values="0.85;0.95;0.85" dur="3s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1" />
      </stop>
      <stop offset="50%" style="stop-color: #5ab8c8; stop-opacity: 0.7" />
      <stop offset="100%" style="stop-color: #9080d0; stop-opacity: 0.4">
        <animate attributeName="stop-opacity" values="0.35;0.45;0.35" dur="3s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1" />
      </stop>
    </radialGradient>

    <!-- Призматический градиент только в фазе «драга» (смещение): цикл 8s -->
    <linearGradient id="dGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #42b883">
        <animate attributeName="stop-color" values="#42b883;#42b883;#5ab8c8;#9080d0;#e0a058;#42b883;#42b883" dur="8s" repeatCount="indefinite" keyTimes="0;0.15;0.35;0.55;0.75;0.85;1" />
      </stop>
      <stop offset="33%" style="stop-color: #42b883">
        <animate attributeName="stop-color" values="#42b883;#42b883;#9080d0;#e0a058;#42b883;#5ab8c8;#42b883" dur="8s" repeatCount="indefinite" keyTimes="0;0.15;0.35;0.55;0.75;0.85;1" />
      </stop>
      <stop offset="66%" style="stop-color: #5ab8c8">
        <animate attributeName="stop-color" values="#42b883;#42b883;#e0a058;#42b883;#5ab8c8;#9080d0;#42b883" dur="8s" repeatCount="indefinite" keyTimes="0;0.15;0.35;0.55;0.75;0.85;1" />
      </stop>
      <stop offset="100%" style="stop-color: #42b883">
        <animate attributeName="stop-color" values="#42b883;#42b883;#42b883;#5ab8c8;#9080d0;#e0a058;#42b883" dur="8s" repeatCount="indefinite" keyTimes="0;0.15;0.35;0.55;0.75;0.85;1" />
      </stop>
    </linearGradient>

    <!-- Glass fill gradients с анимацией -->
    <linearGradient
      id="glassFill1"
      gradientUnits="userSpaceOnUse"
      x1="128"
      y1="0"
      x2="128"
      y2="220"
    >
      <stop offset="0%" style="stop-color: #42b883; stop-opacity: 0.3">
        <animate attributeName="stop-opacity" values="0.25;0.35;0.25" dur="3s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1" />
      </stop>
      <stop offset="100%" style="stop-color: #5ab8c8; stop-opacity: 0.08">
        <animate
          attributeName="stop-opacity"
          values="0.05;0.1;0.05"
          dur="3s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
      </stop>
    </linearGradient>

    <linearGradient
      id="glassFill2"
      gradientUnits="userSpaceOnUse"
      x1="128"
      y1="0"
      x2="128"
      y2="132"
    >
      <stop offset="0%" style="stop-color: #35495e; stop-opacity: 0.45">
        <animate
          attributeName="stop-opacity"
          values="0.4;0.5;0.4"
          dur="3s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
      </stop>
      <stop offset="100%" style="stop-color: #35495e; stop-opacity: 0.18">
        <animate
          attributeName="stop-opacity"
          values="0.15;0.2;0.15"
          dur="3s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
      </stop>
    </linearGradient>

    <!-- Улучшенный фильтр боковых теней -->
    <filter id="glassSideShadow" x="-150%" y="-50%" width="400%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="leftBlur">
        <animate
          attributeName="stdDeviation"
          values="5;7;5"
          dur="3s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
      </feGaussianBlur>
      <feOffset in="leftBlur" dx="-12" dy="6" result="leftShadow">
        <animate
          attributeName="dx"
          values="-10;-14;-10"
          dur="3s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
      </feOffset>
      
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="rightBlur">
        <animate
          attributeName="stdDeviation"
          values="5;7;5"
          dur="3s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
      </feGaussianBlur>
      <feOffset in="rightBlur" dx="12" dy="6" result="rightShadow">
        <animate
          attributeName="dx"
          values="10;14;10"
          dur="3s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
      </feOffset>
      
      <feFlood flood-color="#42b883" flood-opacity="0.25" result="color">
        <animate attributeName="flood-color" values="#42b883;#42b883;#5ab8c8;#9080d0;#e0a058;#42b883;#42b883" dur="8s" repeatCount="indefinite" keyTimes="0;0.15;0.35;0.55;0.75;0.85;1" />
        <animate attributeName="flood-opacity" values="0.2;0.3;0.2" dur="3s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1" />
      </feFlood>
      
      <feComposite in="color" in2="leftShadow" operator="in" result="coloredLeftShadow"/>
      <feComposite in="color" in2="rightShadow" operator="in" result="coloredRightShadow"/>
      
      <feMerge>
        <feMergeNode in="coloredLeftShadow"/>
        <feMergeNode in="coloredRightShadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Улучшенный inner glow -->
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur">
        <animate
          attributeName="stdDeviation"
          values="2;4;2"
          dur="2.5s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
      </feGaussianBlur>
      <feOffset in="blur" dx="0" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.7" result="color">
        <animate
          attributeName="flood-opacity"
          values="0.5;0.8;0.5"
          dur="2.5s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
      </feFlood>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feComposite in="shadow" in2="SourceAlpha" operator="in" result="innerShadow"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="innerShadow"/>
      </feMerge>
    </filter>

    <!-- Background blur circles -->
    <radialGradient id="bgGlow1">
      <stop offset="0%" style="stop-color: #42b883; stop-opacity: 0.3">
        <animate
          attributeName="stop-opacity"
          values="0.25;0.35;0.25"
          dur="3.5s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
      </stop>
      <stop offset="100%" style="stop-color: #5ab8c8; stop-opacity: 0" />
    </radialGradient>

    <radialGradient id="bgGlow2">
      <stop offset="0%" style="stop-color: #9080d0; stop-opacity: 0.25">
        <animate
          attributeName="stop-opacity"
          values="0.2;0.3;0.2"
          dur="4.5s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
      </stop>
      <stop offset="100%" style="stop-color: #e0a058; stop-opacity: 0" />
    </radialGradient>

    <!-- Logo glow pulse effect -->
    <filter id="logoGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur">
        <animate
          attributeName="stdDeviation"
          values="6;9;6"
          dur="3s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
      </feGaussianBlur>
      <feFlood flood-color="#42b883" flood-opacity="0.35" result="color">
        <animate attributeName="flood-color" values="#42b883;#42b883;#5ab8c8;#9080d0;#e0a058;#42b883;#42b883" dur="8s" repeatCount="indefinite" keyTimes="0;0.15;0.35;0.55;0.75;0.85;1" />
        <animate attributeName="flood-opacity" values="0.25;0.4;0.25" dur="3s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1" />
      </feFlood>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Static background removed -->

  <!-- Shadow trail - призрачная версия буквы на исходной позиции -->
  <g opacity="0.3" transform="translate(48, 10)">
    <!-- Outer D shadow -->
    <path
      d="M 30 20 L 30 200 L 100 200 C 160 200, 190 160, 190 110 C 190 60, 160 20, 100 20 Z"
      fill="#42b883"
      opacity="0.15"
    />
    <!-- Inner cutout shadow -->
    <path
      d="M 60 50 L 60 170 L 100 170 C 140 170, 160 145, 160 110 C 160 75, 140 50, 100 50 Z"
      fill="#35495E"
      opacity="0.2"
    />
  </g>

  <!-- Main logo group -->
  <g transform="translate(48, 10)">
    <!-- Normal solid D logo -->
    <g opacity="1" filter="url(#logoGlow)">
      <!-- Outer D shape -->
      <path
        d="M 30 20 L 30 200 L 100 200 C 160 200, 190 160, 190 110 C 190 60, 160 20, 100 20 Z"
        fill="url(#radialDGradient)"
        stroke="url(#dGradient)"
        stroke-width="4"
        stroke-linejoin="round"
      >
        <animate
          attributeName="stroke-width"
          values="3;5;3"
          dur="1.8s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
        <animate
          attributeName="fill-opacity"
          values="0.95;1;0.95"
          dur="2.5s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
      </path>
      
      <!-- Inner cutout -->
      <path
        d="M 60 50 L 60 170 L 100 170 C 140 170, 160 145, 160 110 C 160 75, 140 50, 100 50 Z"
        fill="#35495E"
        stroke="url(#dGradient)"
        stroke-width="4"
        stroke-linejoin="round"
      >
        <animate
          attributeName="stroke-width"
          values="3;5;3"
          dur="1.8s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
        <animate
          attributeName="fill-opacity"
          values="0.95;1;0.95"
          dur="2.5s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
      </path>
      
      <animate
        attributeName="opacity"
        values="1; 1; 0; 0; 0; 1; 1"
        keyTimes="0; 0.15; 0.35; 0.55; 0.75; 0.85; 1"
        dur="8s"
        repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1; 0.165 0.84 0.44 1; 0.165 0.84 0.44 1; 0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
      />
    </g>

    <!-- Glass morphism D logo -->
    <g opacity="0">
      <!-- Outer D with glass effect -->
      <path
        d="M 30 20 L 30 200 L 100 200 C 160 200, 190 160, 190 110 C 190 60, 160 20, 100 20 Z"
        fill="url(#glassFill1)"
        stroke="url(#dGradient)"
        stroke-width="4"
        filter="url(#innerGlow)"
        opacity="0.9"
        stroke-linejoin="round"
      >
        <animate
          attributeName="stroke-width"
          values="3.5;4.5;3.5"
          dur="2s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
        <animate
          attributeName="opacity"
          values="0.85;0.95;0.85"
          dur="2.5s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
      </path>

      <!-- Inner cutout with glass effect -->
      <path
        d="M 60 50 L 60 170 L 100 170 C 140 170, 160 145, 160 110 C 160 75, 140 50, 100 50 Z"
        fill="url(#glassFill2)"
        stroke="url(#dGradient)"
        stroke-width="4"
        filter="url(#innerGlow)"
        opacity="0.95"
        stroke-linejoin="round"
      >
        <animate
          attributeName="stroke-width"
          values="3.5;4.5;3.5"
          dur="2s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
        <animate
          attributeName="opacity"
          values="0.9;1;0.9"
          dur="2.5s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
      </path>

      <!-- Highlight line on inner cutout -->
      <path
        d="M 60 50 L 60 110"
        fill="none"
        stroke="white"
        stroke-width="1.5"
        opacity="0.6"
        stroke-linecap="round"
      >
        <animate
          attributeName="opacity"
          values="0.5;0.7;0.5"
          dur="2s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
        />
      </path>

      <!-- Side shadow effect -->
      <g filter="url(#glassSideShadow)">
        <path
          d="M 30 20 L 30 200 L 100 200 C 160 200, 190 160, 190 110 C 190 60, 160 20, 100 20 Z"
          fill="transparent"
          stroke="transparent"
          stroke-width="25"
        />
        <path
          d="M 60 50 L 60 170 L 100 170 C 140 170, 160 145, 160 110 C 160 75, 140 50, 100 50 Z"
          fill="transparent"
          stroke="transparent"
          stroke-width="18"
        />
      </g>

      <animate
        attributeName="opacity"
        values="0; 0; 1; 1; 1; 0; 0"
        keyTimes="0; 0.15; 0.35; 0.55; 0.75; 0.85; 1"
        dur="8s"
        repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.165 0.84 0.44 1; 0.165 0.84 0.44 1; 0.165 0.84 0.44 1; 0.165 0.84 0.44 1; 0.165 0.84 0.44 1; 0.165 0.84 0.44 1"
      />
    </g>
  </g>
</svg>